<!doctype html>
<html lang="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#F79009" />
    <title>Du er offline</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, "Apple Color Emoji", "Segoe UI Emoji";
        background: #f9fafb;
        color: #111827;
      }
      .wrap {
        max-width: 520px;
        margin: 0 auto;
        padding: 40px 16px;
      }
      .card {
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 6px 18px rgba(17, 24, 39, 0.06);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 20px;
      }
      p {
        margin: 0 0 12px;
        line-height: 1.45;
        color: #374151;
      }
      .hint {
        font-size: 13px;
        color: #6b7280;
      }
      .btn {
        display: inline-block;
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #d1d5db;
        background: #fff;
        color: #111827;
        text-decoration: none;
        font-weight: 600;
      }
      .btn:active {
        transform: translateY(1px);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Du er offline</h1>
        <p>Appen får ikke kontakt med nettet akkurat nå.</p>
        <p class="hint">
          Hvis du har trykket «Last ned» tidligere, kan du fortsatt bruke innhold
          som er lagret lokalt. Når du får dekning igjen, vil appen oppdatere seg
          automatisk.
        </p>
        <a class="btn" href="/">Prøv igjen</a>
      </div>
    </div>
  </body>
</html>
